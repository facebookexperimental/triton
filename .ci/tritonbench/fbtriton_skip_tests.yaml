# Test skip list in tritonbench OSS CI
# Usage:
#  op: to skip an entire operator
#    extra_args: <extra args to pass to the test>
#    extra_bwd_args: <extra args to pass to the backward test>
#    devices: <list of devices> (options: "cuda", "hip", "h100", "mi350", "b200", default: ["h100", "mi350"])
#    channels: <list of triton channels> (options: "triton-main", "meta-triton", default: ["triton-main", "meta-triton"])
# to override the default, specify devices and channels to limit combinations
# we rely on the code to determine specific backends to skip
#    disabled_devices: <list of devices to disable on>
#    disabled_channels: <list of triton channels to disable on>
#    backends: <comma-separated backends to skip via --skip> (requires disabled_devices
#              or disabled_channels; only the listed backends are skipped instead of
#              disabling the entire operator when the disabled_* condition matches)
#
# Override the skip list entirely by setting the env var TRITONBENCH_TEST_SKIP_FILE
# to a custom yaml file path (a RuntimeError is raised if the file does not exist).

# aoti_kernel requires --artifact arg; tested separately
aoti_kernel:
# cpu-op for testing
test_op:
# fb-only ops
fp8_fused_quant_gemm_rowwise:
flash_attention:
  extra_bwd_args: --causal
  report: true
  disabled_devices:
    - hip
# Device specific tests
blackwell_attentions_mxfp8:
  devices:
    - b200
  # Inherits the parent op's input shapes (input-0 is N_CTX=128), which triggers
  # the same AutoWS compiler crash and cross-tile race on the persistent
  # Blackwell FA path (single-trip inner loop). Run seq>=256 in CI until that is
  # fixed. See T279315890.
  extra_args: --seq-len 256
blackwell_attentions:
  devices:
    - b200
  # Default input-0 is N_CTX=128, which triggers an AutoWS compiler crash and a
  # cross-tile race on the persistent Blackwell FA path (single-trip inner
  # loop). Run seq>=256 in CI until that is fixed. See T279315890.
  extra_args: --seq-len 256
nvfp4_gemm:
  devices:
    - b200
fp32_to_mx4:
  devices:
    - cuda
mx4_to_fp32:
  devices:
    - cuda
# NVGPUWarpSpecialization pass crashes on hstu_attn_fwd kernel
ragged_attention:
  report: true
  disabled_devices:
    - cuda
# rms_norm subprocess segfaults on hip (exit code 11)
rms_norm:
  report: true
  disabled_devices:
    - hip
# ============ TODO: errors in CI ============
launch_latency:
  backends: nop_triton_kernel_autotuned,nop_triton_kernel_autotuned_nocache
  disabled_devices:
    - cuda
## torch.AcceleratorError: CUDA error: unspecified launch failure
decoding_attention:
  report: true
# TODO: MSLK does not work with meta-triton
# TypeError: failed to specialize argument of type: KernelParamWrapper
fp8_gemm_rowwise:
  report: true
# TODO: jagged_mean, jagged_sum will segfault on hip
fp8_attention:
  report: true
  disabled_devices:
    - hip
gather_gemv:
  report: true
  disabled_devices:
    - hip
jagged_softmax:
  report: true
  disabled_devices:
    - hip
jagged_mean:
  report: true
  disabled_devices:
    - hip
jagged_sum:
  report: true
  disabled_devices:
    - hip
# TODO: embedding, flash_attention will segfault on hip
embedding:
  report: true
  disabled_devices:
    - hip
# TODO: welford, jsd will segfault on hip
welford:
  report: true
  disabled_devices:
    - hip
jsd:
  report: true
  disabled_devices:
    - hip
# torch_tlx_addmm / torch_tlx_mm patch torch._inductor.config.triton.tlx_mode, a knob
# registered only by the torchTLX inductor shim (scripts/_torchtlx_torch_shim.py), which is
# NOT on release/3.7.x (the TLX DSL is present but the torchTLX integration is not).
# tritonbench's has_tlx() gate only checks the DSL, so it enables these backends on the
# meta-triton wheel, where they then fail with "torch._inductor.config.triton.tlx_mode does
# not exist". Skip just those backends on the meta-triton channel (triton-main has no DSL, so
# has_tlx() is False there and they are not enabled).
addmm:
  backends: torch_tlx_addmm
  disabled_channels:
    - meta-triton
gemm:
  backends: torch_tlx_mm
  disabled_channels:
    - meta-triton
