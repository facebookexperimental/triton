name: Publish Python 🐍 distribution 📦 to PyPI

on:
  push:
    tags:
      - '*'

permissions: read-all

jobs:
  build:
    name: Build distribution 📦
    timeout-minutes: 180
    runs-on: ${{ matrix.config.runs_on }}

    strategy:
      fail-fast: false
      matrix:
        config:
        - {runs_on: ['self-hosted', 'CPU'], arch: 'x86_64'}
        - {runs_on: 'ubuntu-22.04-arm', arch: 'aarch64'}

    # The self-hosted x86_64 runner ships a docker CLI (1.52) newer than the
    # daemon's max API version (1.43), so unpinned docker commands fail with
    # "client version 1.52 is too new". Pin at the job level so every step
    # (including cibuildwheel's internal docker invocations) inherits it.
    env:
      DOCKER_API_VERSION: "1.43"

    steps:
    - name: Prune stale docker containers
      run: |
        docker container prune -f

    - name: Checkout
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Patch setup.py
      run: |
        echo "" >> python/setup.cfg
        echo "[build_ext]" >> python/setup.cfg
        echo "base-dir=/project" >> python/setup.cfg

    - name: Build wheels
      run: |
        python3 -m pip install cibuildwheel --upgrade --user
        export CIBW_ENVIRONMENT="MAX_JOBS=4 \
                TRITON_EXT_ENABLED=ON \
                TRITON_BUILD_WITH_CLANG_LLD=1 \
                TRITON_WHEEL_NAME=fb-triton"

        export CIBW_BEFORE_ALL="dnf install clang lld -y"

        # Skip auditwheel's dependency-bundling pass on libtriton.so. Without
        # this, every shared library libtriton.so links against is copied into
        # triton.libs/ and the wheel grows by ~130MB. PyTorch's build script
        # uses the same flag for the same reason.
        export CIBW_REPAIR_WHEEL_COMMAND_LINUX="auditwheel repair --exclude libtriton.so -w {dest_dir} {wheel}"

        if [[ ${{ matrix.config.arch }} == 'x86_64' ]]; then
          export CIBW_MANYLINUX_X86_64_IMAGE="quay.io/pypa/manylinux_2_28_${{ matrix.config.arch }}:latest"
        else
          export CIBW_MANYLINUX_AARCH64_IMAGE="quay.io/pypa/manylinux_2_28_${{ matrix.config.arch }}:latest"
        fi

        export CIBW_BUILD="cp3{10,11,12,13,13t,14,14t}-manylinux_${{ matrix.config.arch }}"
        export CIBW_SKIP="cp{35,36,37,38,39}-*"
        export CIBW_ENABLE=cpython-freethreading
        python3 -m cibuildwheel . --output-dir wheelhouse

    - name: Store the distribution packages
      uses: actions/upload-artifact@v7
      with:
        name: python-package-distributions-${{ matrix.config.arch }}
        path: ./wheelhouse/*.whl

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/fb-triton/
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v8
      with:
        pattern: python-package-distributions-*
        path: dist/
        merge-multiple: true
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
