name: Meta Triton MI350 Tests
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  mi350-meta-triton-test:
    if: github.repository_owner == 'facebookexperimental'
    runs-on: linux-fb-triton-mi350-1
    env:
      DOCKER_IMAGE: "ghcr.io/meta-pytorch/tritonbench:rocm-latest"
      CONDA_ENV: meta-triton
      SETUP_SCRIPT: /workspace/setup_instance.sh
    timeout-minutes: 240
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Pull docker image
        uses: pytorch/test-infra/.github/actions/pull-docker-image@main
        with:
          docker-image: ${{ env.DOCKER_IMAGE }}
      - name: Run Tritonbench Docker image
        run: |
          set -eux
          GPU_FLAG="--device /dev/kfd --device /dev/dri --security-opt seccomp=unconfined --group-add video"

          container_name=$(docker run \
            ${GPU_FLAG:-} \
            -e CONDA_ENV \
            -e SETUP_SCRIPT \
            --ipc=host \
            --tty \
            --detach \
            --shm-size=32g \
            --cap-add=SYS_PTRACE \
            -v "${GITHUB_WORKSPACE}:/tmp/workspace" \
            -w /tmp/workspace \
            "${DOCKER_IMAGE}"
          )
          echo "container_name=${container_name}" >> "$GITHUB_ENV"
      - name: Compile Triton
        run: |
          docker exec -t -w /tmp/workspace "${container_name}" bash -c "
            set -eux
            bash /workspace/tritonbench/.ci/uv/install.sh
            . ${SETUP_SCRIPT}
            . /workspace/tritonbench/.ci/triton/triton_install_utils.sh
            cd /tmp/workspace; install_triton .
          "
      - name: Run TritonBench
        run: |
          docker exec -t -w /tmp/workspace "${container_name}" bash -c "
            set -eux
            bash ./.ci/tritonbench/test-gpu.sh
          "

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true
