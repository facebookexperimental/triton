name: Report Nightly Failure

# Reusable workflow that files (or updates) a GitHub issue for a single nightly
# CI failure identity. Callers invoke it once per normalized failing test
# identity (typically via a matrix), so each distinct failure gets its own
# idempotent issue keyed on the issue title + labels.

on:
  workflow_call:
    inputs:
      issue_title:
        description: Stable, unique issue title for this failure identity.
        required: true
        type: string
      normalized_failure_id:
        description: Normalized failing test identity (params stripped).
        required: true
        type: string
      raw_failure_ids:
        description: Raw failing test IDs (newline- or JSON-separated), if any.
        required: false
        type: string
        default: ""
      workflow_name:
        description: Name of the workflow that failed.
        required: true
        type: string
      job_name:
        description: Name of the job that failed.
        required: true
        type: string
      run_url:
        description: URL of the failing workflow run.
        required: true
        type: string
      ref:
        description: Git ref of the failing run.
        required: true
        type: string
      sha:
        description: Git SHA of the failing run.
        required: true
        type: string
      event_name:
        description: Triggering event name (should be 'schedule').
        required: true
        type: string
      run_attempt:
        description: Run attempt number.
        required: true
        type: string
      summary:
        description: Optional short failure summary (e.g. first error line).
        required: false
        type: string
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  file-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create or update nightly failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const labels = ["ci_issues", "nightly"];
            const title = ${{ toJSON(inputs.issue_title) }};
            const normalizedId = ${{ toJSON(inputs.normalized_failure_id) }};
            const rawIds = ${{ toJSON(inputs.raw_failure_ids) }};
            const workflowName = ${{ toJSON(inputs.workflow_name) }};
            const jobName = ${{ toJSON(inputs.job_name) }};
            const runUrl = ${{ toJSON(inputs.run_url) }};
            const ref = ${{ toJSON(inputs.ref) }};
            const sha = ${{ toJSON(inputs.sha) }};
            const eventName = ${{ toJSON(inputs.event_name) }};
            const runAttempt = ${{ toJSON(inputs.run_attempt) }};
            const summary = ${{ toJSON(inputs.summary) }};

            // Normalize raw IDs into a readable list (accepts newline or JSON).
            let rawList = [];
            if (rawIds && rawIds.trim()) {
              const trimmed = rawIds.trim();
              if (trimmed.startsWith("[")) {
                try { rawList = JSON.parse(trimmed); } catch (e) { rawList = [trimmed]; }
              } else {
                rawList = trimmed.split("\n").map(s => s.trim()).filter(Boolean);
              }
            }
            const rawBlock = rawList.length
              ? "```\n" + rawList.join("\n") + "\n```"
              : "_none reported_";

            const body = [
              "> Auto-filed by nightly CI. Do not edit the title — it is the dedup key.",
              "",
              "| Field | Value |",
              "| --- | --- |",
              "| Workflow | `" + workflowName + "` |",
              "| Job | `" + jobName + "` |",
              "| Normalized failing identity | `" + normalizedId + "` |",
              "| Ref | `" + ref + "` |",
              "| SHA | `" + sha + "` |",
              "| Event | `" + eventName + "` |",
              "| Run attempt | `" + runAttempt + "` |",
              "| Run | " + runUrl + " |",
              "",
              "### Raw failing test IDs",
              rawBlock,
              "",
              summary ? "### Summary\n```\n" + summary + "\n```" : "",
              "",
              "_Last updated: " + new Date().toISOString() + "_",
            ].join("\n");

            // Find an existing OPEN issue with the exact same title + labels.
            const escapedTitle = title.replace(/"/g, '\\"');
            const q = [
              `repo:${context.repo.owner}/${context.repo.repo}`,
              "is:issue",
              "is:open",
              ...labels.map(l => `label:"${l}"`),
              `in:title "${escapedTitle}"`,
            ].join(" ");
            const search = await github.rest.search.issuesAndPullRequests({ q, per_page: 10 });
            const existing = search.data.items.find(i => i.title === title && !i.pull_request);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated existing issue #${existing.number}: ${title}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
              core.info(`Created issue #${created.data.number}: ${title}`);
            }
